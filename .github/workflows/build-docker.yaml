name: Build Docker on Tag

on:
  push:
    tags:
      - 'v*.*.*'

env:
  DOCKERHUB_IMAGE_NAME: openpilipili/embystream
  GHCR_IMAGE_NAME: ghcr.io/pilipili-team/embystream
  CARGO_TERM_COLOR: always

jobs:
  build-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64 digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.GHCR_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-amd64,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-amd64
          path: /tmp/digests/*
          retention-days: 1

  build-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push arm64 digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.GHCR_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-arm64,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-arm64
          path: /tmp/digests/*
          retention-days: 1

  merge:
    name: Merge and Push Manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: cargo_version
        run: |
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)
          if [ -z "$VERSION" ]; then
            echo "Could not read version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create GHCR manifest list
        working-directory: /tmp/digests
        run: |
          VERSION="${{ steps.cargo_version.outputs.version }}"
          docker buildx imagetools create \
            -t ${{ env.GHCR_IMAGE_NAME }}:${VERSION} \
            -t ${{ env.GHCR_IMAGE_NAME }}:latest \
            $(printf '${{ env.GHCR_IMAGE_NAME }}@sha256:%s ' *)

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to Docker Hub via crane
        run: |
          crane auth login index.docker.io \
            -u ${{ secrets.DOCKERHUB_USERNAME }} \
            -p ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Copy to Docker Hub
        run: |
          VERSION="${{ steps.cargo_version.outputs.version }}"
          crane copy ${{ env.GHCR_IMAGE_NAME }}:${VERSION} ${{ env.DOCKERHUB_IMAGE_NAME }}:${VERSION}
          crane copy ${{ env.GHCR_IMAGE_NAME }}:latest ${{ env.DOCKERHUB_IMAGE_NAME }}:latest
