name: Build Docker (manual)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push image to Docker Hub and ghcr.io (disable to build only)"
        type: boolean
        default: true

env:
  DOCKERHUB_IMAGE_NAME: openpilipili/embystream
  GHCR_IMAGE_NAME: ghcr.io/pilipili-team/embystream
  CARGO_TERM_COLOR: always

jobs:
  build-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-publish.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ inputs.publish }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64 digest
        id: build-publish
        if: ${{ inputs.publish }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.GHCR_IMAGE_NAME }},${{ env.DOCKERHUB_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-amd64,mode=max

      - name: Build amd64 (verify only)
        if: ${{ !inputs.publish }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-amd64,mode=max

      - name: Export digest
        if: ${{ inputs.publish }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-publish.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-amd64
          path: /tmp/digests/*
          retention-days: 1

  build-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-publish.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ inputs.publish }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push arm64 digest
        id: build-publish
        if: ${{ inputs.publish }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.GHCR_IMAGE_NAME }},${{ env.DOCKERHUB_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-arm64,mode=max

      - name: Build arm64 (verify only)
        if: ${{ !inputs.publish }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:buildcache-arm64,mode=max

      - name: Export digest
        if: ${{ inputs.publish }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-publish.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-arm64
          path: /tmp/digests/*
          retention-days: 1

  merge:
    name: Merge and Push Manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    if: ${{ inputs.publish }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: cargo_version
        run: |
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)
          if [ -z "$VERSION" ]; then
            echo "Could not read version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE_NAME }}
            ${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.cargo_version.outputs.version }}
            type=sha,prefix=sha-

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf '${{ env.GHCR_IMAGE_NAME }}@sha256:%s ' *)
